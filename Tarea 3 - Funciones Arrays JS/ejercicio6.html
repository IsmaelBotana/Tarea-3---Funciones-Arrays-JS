<body>
    <script>
        const nombres = [
            "ana garcia",
            "luis perez",
            "marta lopez",
            "carlos ruiz"
        ];
        // Resultado esperado: ["GARCIA, Ana", "PEREZ, Luis", ...]
        const formateados = nombres.map(nombre =>{
            let array = nombre.split(" ")
            let soporte
            soporte = array[0] 
            array[0] = array[1]
            array[1] = soporte
            return array.join(", ")
        });
        console.log(formateados);
    </script>
