<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio2</title>
</head>

<body>
    <p id="comprobacion"></p>
    <script>
        const comprobacion = document.getElementById("comprobacion")
        const productos = [
            { nombre: "Manzana", precio: 1.2, stock: 50 },
            { nombre: "Kiwi", precio: 0.8, stock: 0 },
            { nombre: "Mango", precio: 2.5, stock: 12 },
            { nombre: "Papaya", precio: 3.0, stock: 0 },
            { nombre: "Naranja", precio: 0.6, stock: 30 },
        ];
        const disponibles = productos.filter(tieneStock);
        comprobacion.innerHTML = JSON.stringify(disponibles)
        function tieneStock(producto){
            return producto.stock > 0
        }
    </script>
</body>

</html>
