<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio4</title>
</head>
<body>
    <p id="mapeados"></p>
    <script>
        const mapeados = document.getElementById("mapeados")
        const precios = [10, 25.5, 8.99, 100, 49.95];
        const conIVA = precios.map(aplicarIva);
        mapeados.innerHTML = conIVA
        function aplicarIva(numero){
            return (Math.round((numero + (numero * 0.21)) * 100) / 100);
        }
    </script>
</body>
</html>
